<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azeer Config Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0f;
      --surface: #17171a;
      --border: #2a2a30;
      --accent: #7c6af7;
      --accent-dim: #3d3580;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #34d399;
      --error: #f87171;
      --warning: #fbbf24;
      --merge-glow: #fbbf24;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* PASSWORD SCREEN */
    #password-screen { width: 100%; max-width: 380px; padding: 2rem; text-align: center; }
    .logo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 2.5rem; }
    .logo span { display: block; font-size: 22px; letter-spacing: 0.05em; color: var(--text); margin-top: 6px; font-weight: 500; }
    .logo-img { width: 72px; height: 72px; border-radius: 16px; display: block; margin: 0 auto 12px; object-fit: cover; }
    #password-screen input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px; text-align: center; letter-spacing: 0.15em; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
    #password-screen input:focus { border-color: var(--accent); }
    #password-screen button { width: 100%; background: var(--accent); border: none; border-radius: 8px; padding: 12px; color: #fff; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    #password-screen button:hover { opacity: 0.85; }
    .pw-error { font-size: 13px; color: var(--error); margin-top: 10px; min-height: 20px; }

    /* CHAT SCREEN */
    #chat-screen { display: none; flex-direction: column; width: 100%; max-width: 800px; height: 100vh; }
    .chat-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .chat-header-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); letter-spacing: 0.05em; }
    .chat-header-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

    .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
    .avatar.ai { background: var(--accent-dim); color: var(--accent); }
    .avatar.user-av { background: #1e2a1e; color: var(--success); }
    .bubble { max-width: 82%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .message.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .message.user .bubble { background: var(--accent-dim); border: 1px solid var(--accent); border-top-right-radius: 4px; color: #d4d0ff; }

    .file-bubble { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted); max-width: 82%; }
    .file-bubble .file-icon { font-size: 20px; flex-shrink: 0; }
    .file-bubble .file-name { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .file-bubble .file-size { font-size: 11px; color: var(--muted); }

    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* INPUT AREA */
    .input-area { padding: 0.75rem 1.5rem 1.25rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .file-preview { display: none; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; }
    .file-preview.visible { display: flex; }
    .file-preview .fp-name { color: var(--text); font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-preview .fp-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
    .file-preview .fp-remove:hover { color: var(--error); }
    .input-row { display: flex; gap: 10px; }
    #user-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; max-height: 140px; line-height: 1.5; }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    .btn-upload { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; flex-shrink: 0; align-self: flex-end; color: var(--muted); }
    .btn-upload:hover { border-color: var(--accent); color: var(--accent); }
    .btn-upload svg { width: 18px; height: 18px; }

    #send-btn { background: var(--accent); border: none; border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; align-self: flex-end; }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* WELCOME CARDS */
    .welcome-area { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 2rem 1.5rem; gap: 1.5rem; }
    .welcome-title { font-size: 18px; font-weight: 500; color: var(--text); text-align: center; }
    .welcome-sub { font-size: 13px; color: var(--muted); text-align: center; margin-top: -8px; }

    .cards-row { display: flex; gap: 16px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .cards-row-merge { display: flex; width: 100%; justify-content: center; position: relative; }

    .config-card {
      flex: 1; min-width: 180px; max-width: 220px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px 18px 20px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
      text-align: center; position: relative;
    }
    .config-card:hover { border-color: var(--accent); background: #1c1b2a; transform: translateY(-2px); }
    .config-card.drag-over { border-color: var(--accent); background: #1c1b2a; border-style: dashed; }
    .card-icon { font-size: 32px; line-height: 1; }
    .card-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }
    .card-hint { font-size: 11px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }

    .card-biz-form { display: none; flex-direction: column; gap: 8px; width: 100%; margin-top: 4px; }
    .card-biz-form.visible { display: flex; }
    .card-biz-form input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; width: 100%; text-align: left; }
    .card-biz-form input:focus { border-color: var(--accent); }
    .card-biz-form input::placeholder { color: var(--muted); }
    .card-biz-form button { background: var(--accent); border: none; border-radius: 8px; padding: 9px; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .card-biz-form button:hover { opacity: 0.85; }
    .card-biz-form button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MERGE CARD */
    .merge-card {
      width: 100%; max-width: 680px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 22px 24px 20px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      text-align: center; position: relative;
    }
    .merge-card:hover { border-color: var(--merge-glow); background: #1c1a12; box-shadow: 0 0 20px rgba(251,191,36,0.12); }

    .merge-arrows-wrap { position: relative; width: 100%; max-width: 680px; height: 36px; pointer-events: none; }
    .merge-arrow { position: absolute; bottom: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; opacity: 0; transition: opacity 0.3s, filter 0.3s; }
    .merge-arrow.left { left: 22%; }
    .merge-arrow.right { right: 42%; }
    .merge-arrow svg { width: 18px; height: 18px; }
    .merge-arrow .arrow-line { width: 2px; height: 16px; background: var(--merge-glow); border-radius: 1px; }
    .merge-arrows-wrap.glowing .merge-arrow { opacity: 1; filter: drop-shadow(0 0 6px rgba(251,191,36,0.9)); }

    .merge-card-body { display: flex; align-items: center; gap: 16px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .merge-card-icon { font-size: 28px; }
    .merge-card-text { text-align: left; }
    .merge-card-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .merge-card-desc { font-size: 12px; color: var(--muted); line-height: 1.55; max-width: 420px; }
    .merge-card-hint { font-size: 11px; color: var(--merge-glow); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }

    .merge-form { display: none; flex-direction: row; gap: 12px; width: 100%; margin-top: 8px; align-items: flex-end; flex-wrap: wrap; }
    .merge-form.visible { display: flex; }
    .merge-form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; text-align: left; }
    .merge-form-group label { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .merge-form-group input[type="text"] { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; width: 100%; }
    .merge-form-group input[type="text"]:focus { border-color: var(--merge-glow); }
    .merge-form-group input[type="text"]::placeholder { color: var(--muted); }
    .merge-file-label { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; padding: 9px 12px; cursor: pointer; transition: border-color 0.2s; font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .merge-file-label:hover { border-color: var(--merge-glow); color: var(--text); }
    .merge-file-label .merge-file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    .merge-submit-btn { background: var(--merge-glow); border: none; border-radius: 8px; padding: 10px 20px; color: #0e0e0f; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; align-self: flex-end; font-family: 'IBM Plex Sans', sans-serif; }
    .merge-submit-btn:hover { opacity: 0.85; }
    .merge-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MARKDOWN STYLES */
    .bubble.ai-bubble h1,.bubble.ai-bubble h2,.bubble.ai-bubble h3 { font-weight: 500; margin: 1rem 0 0.5rem; color: var(--text); }
    .bubble.ai-bubble h1 { font-size: 16px; }
    .bubble.ai-bubble h2 { font-size: 15px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .bubble.ai-bubble h3 { font-size: 14px; }
    .bubble.ai-bubble p { margin: 0.5rem 0; }
    .bubble.ai-bubble ul,.bubble.ai-bubble ol { margin: 0.5rem 0 0.5rem 1.25rem; }
    .bubble.ai-bubble li { margin: 3px 0; }
    .bubble.ai-bubble strong { font-weight: 500; color: var(--text); }
    .bubble.ai-bubble code { font-family: 'IBM Plex Mono', monospace; background: #1e1e24; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .bubble.ai-bubble pre { background: #1e1e24; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 0.5rem 0; }
    .bubble.ai-bubble pre code { background: none; padding: 0; }
    .bubble.ai-bubble hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .bubble.ai-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 0.5rem 0; }

    /* DOWNLOAD BUTTONS */
    .download-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .dl-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; transition: border-color 0.2s; font-family: 'IBM Plex Mono', monospace; }
    .dl-btn:hover { border-color: var(--accent); }
    .dl-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }

    /* HEADER BUTTONS */
    .how-btn { display: flex; align-items: center; gap: 6px; background: rgba(52,211,153,0.10); border: 1px solid #34d399; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #34d399; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; }
    .how-btn:hover { background: rgba(52,211,153,0.18); }
    .how-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .refresh-btn { display: flex; align-items: center; gap: 6px; background: rgba(251,191,36,0.10); border: 1px solid #fbbf24; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #fbbf24; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; }
    .refresh-btn:hover { background: rgba(251,191,36,0.18); }
    .refresh-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* VIDEO MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 680px; position: relative; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .modal-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); letter-spacing: 0.05em; }
    .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 22px; line-height: 1; padding: 0; }
    .modal-close:hover { color: var(--text); }
    .modal-box iframe { width: 100%; height: 360px; border: none; border-radius: 10px; background: #000; }
    .modal-skip { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .modal-skip:hover { color: var(--text); }
    .supported-files { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; }
  </style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="logo">
    <!--
      FIX: Logo is now a plain <img> tag referencing /logo.png (or /logo.jpg).
      Place your logo file in the /public folder of your Vercel project.
      This removes the giant inline base64 blob that was causing
      Resource::kQuotaBytes quota exceeded errors in the browser.
    -->
    <img src="/logo.png" alt="Azeer" class="logo-img"
         onerror="this.style.display='none'" />
    <span>Azeer Config Studio</span>
  </div>
  <input type="password" id="pw-input" placeholder="Enter access code" />
  <button onclick="checkPassword()">Enter</button>
  <div class="pw-error" id="pw-error"></div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <div class="chat-header-title">Azeer Config Studio</div>
    <div class="chat-header-sub">Azeer Internal Tool</div>
    <button class="refresh-btn" onclick="resetConversation()" title="Reset conversation">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3z"/></svg>
      Reset
    </button>
    <button class="how-btn" onclick="openModal()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
      How to use
    </button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="file-preview" id="file-preview">
      <span id="fp-icon">📄</span>
      <span class="fp-name" id="fp-name"></span>
      <button class="fp-remove" onclick="removeFile()" title="Remove file">×</button>
    </div>
    <div class="input-row" id="chat-row">
      <label class="btn-upload" title="Upload PDF, DOCX or JSON">
        <input type="file" id="file-input" accept=".pdf,.docx,.json" style="display:none" onchange="handleFileSelect(event)" />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </label>
      <textarea id="user-input" rows="1" placeholder="Describe the business or paste a config..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="supported-files">Supported files: PDF · DOCX · JSON</div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="video-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title"><span style="color:#FFC857;">💡</span> <span style="color:#FFC857;">How to use Azeer Config Studio</span></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <iframe id="tutorial-video" src="" allow="autoplay" allowfullscreen></iframe>
    <span class="modal-skip" onclick="closeModal()">Skip — start using the tool</span>
  </div>
</div>

<script>
  // ── FIX 1: Suppress quota errors from crashing the app ──────────────────────
  // The base64 logo (now removed) was causing Resource::kQuotaBytes errors.
  // This guard catches any residual storage errors from 3rd-party scripts.
  window.addEventListener('error', function(e) {
    if (e.message && (e.message.includes('QuotaExceeded') || e.message.includes('kQuotaBytes'))) {
      e.preventDefault();
      console.warn('Storage quota error suppressed:', e.message);
    }
  });
  window.addEventListener('unhandledrejection', function(e) {
    if (e.reason && String(e.reason).includes('QuotaExceeded')) {
      e.preventDefault();
      console.warn('Storage quota rejection suppressed:', e.reason);
    }
  });

  const VIDEO_URL = 'https://www.youtube.com/embed/NYGqPBeWTB4?vq=hd1080&rel=0';
  let videoSeen = false;

  let conversationHistory = [];
  let storedPassword = '';
  let pendingFile = null;
  let mergeFile = null;

  function getPassword() { return storedPassword || ''; }

  function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    const btn = document.querySelector('#password-screen button');
    btn.textContent = 'Checking...';
    btn.disabled = true;
    storedPassword = pw;
    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: 'hi' }], password: pw })
    }).then(r => {
      if (r.status === 401) {
        document.getElementById('pw-error').textContent = 'Incorrect access code.';
        btn.textContent = 'Enter';
        btn.disabled = false;
      } else {
        document.getElementById('password-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        renderWelcome();
        if (!videoSeen) openModal();
      }
    }).catch(() => {
      document.getElementById('pw-error').textContent = 'Connection error. Try again.';
      btn.textContent = 'Enter';
      btn.disabled = false;
    });
  }
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

  function openModal() {
    document.getElementById('tutorial-video').src = VIDEO_URL;
    document.getElementById('video-modal').classList.add('visible');
  }
  function closeModal() {
    document.getElementById('video-modal').classList.remove('visible');
    document.getElementById('tutorial-video').src = '';
    videoSeen = true;
  }

  // ── WELCOME CARDS ────────────────────────────────────────────────────────────
  function renderWelcome() {
    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = `
      <div class="welcome-area" id="welcome-area">
        <div class="welcome-title">Choose how to generate your AI Agent config</div>
        <div class="welcome-sub">Pick a method below to get started</div>

        <div class="cards-row">
          <div class="config-card" id="card-file"
               onclick="triggerFileCard()"
               ondragover="cardDragOver(event,'card-file')"
               ondragleave="cardDragLeave('card-file')"
               ondrop="cardDrop(event)">
            <div class="card-icon">📂</div>
            <div class="card-title">Upload a File</div>
            <div class="card-desc">Upload a bot JSON, PDF catalogue, or DOCX document and generate a full config from it.</div>
            <div class="card-hint">PDF · DOCX · JSON — drag & drop or click</div>
            <input type="file" id="card-file-input" accept=".pdf,.docx,.json" style="display:none" onchange="handleFileSelect(event)" />
          </div>

          <div class="config-card" id="card-biz" onclick="toggleBizForm(event)">
            <div class="card-icon">🔍</div>
            <div class="card-title">Generate by Business ID</div>
            <div class="card-desc">Fetch the last 5,000 WhatsApp conversations for a merchant and auto-generate their config.</div>
            <div class="card-hint">Uses Mottasl conversation history</div>
            <div class="card-biz-form" id="card-biz-form">
              <input type="text" id="card-biz-input" placeholder="e.g. 2c8a9a2d-04f8-49df-..." onclick="event.stopPropagation()" />
              <button id="card-biz-btn" onclick="event.stopPropagation(); cardFetchBizId()">Fetch & Generate</button>
            </div>
          </div>

          <div class="config-card" id="card-desc" onclick="focusDescription()">
            <div class="card-icon">✏️</div>
            <div class="card-title">Write a Description</div>
            <div class="card-desc">Describe the business — what they sell, how they talk to customers — and get a config built from scratch.</div>
            <div class="card-hint">Type in the box below</div>
          </div>
        </div>

        <div class="merge-arrows-wrap" id="merge-arrows-wrap">
          <div class="merge-arrow left">
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 14V4M9 4L4 9M9 4L14 9" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="arrow-line"></div>
          </div>
          <div class="merge-arrow right">
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 14V4M9 4L4 9M9 4L14 9" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="arrow-line"></div>
          </div>
        </div>

        <div class="cards-row-merge">
          <div class="merge-card" id="merge-card"
               onmouseenter="glowArrows(true)"
               onmouseleave="glowArrows(false)"
               onclick="toggleMergeForm(event)">
            <div class="merge-card-body">
              <div class="merge-card-icon">⚡</div>
              <div class="merge-card-text">
                <div class="merge-card-title">Deep Config — Chatbot + Conversation History</div>
                <div class="merge-card-desc">Combine an existing chatbot file (JSON/PDF/DOCX) with real WhatsApp message history from a Business ID. The AI cross-references both to produce a stronger, more accurate config grounded in actual customer conversations.</div>
                <div class="merge-card-hint">Merges: Upload a File + Business ID → richer output</div>
              </div>
            </div>

            <div class="merge-form" id="merge-form" onclick="event.stopPropagation()">
              <div class="merge-form-group">
                <label>Business ID</label>
                <input type="text" id="merge-biz-input" placeholder="e.g. 2c8a9a2d-04f8-49df-..." />
              </div>
              <div class="merge-form-group">
                <label>Chatbot file (JSON · PDF · DOCX)</label>
                <label class="merge-file-label" for="merge-file-input">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <span class="merge-file-name" id="merge-file-name">Choose file…</span>
                  <input type="file" id="merge-file-input" accept=".pdf,.docx,.json" style="display:none" onchange="handleMergeFile(event)" />
                </label>
              </div>
              <button class="merge-submit-btn" id="merge-submit-btn" onclick="startMerge()">⚡ Generate Deep Config</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function glowArrows(on) {
    const el = document.getElementById('merge-arrows-wrap');
    if (el) el.classList.toggle('glowing', on);
  }

  function toggleMergeForm(e) {
    const form = document.getElementById('merge-form');
    if (!form) return;
    form.classList.toggle('visible');
    if (form.classList.contains('visible')) {
      setTimeout(() => {
        const inp = document.getElementById('merge-biz-input');
        if (inp) inp.focus();
      }, 50);
    }
  }

  function handleMergeFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    mergeFile = file;
    const nameEl = document.getElementById('merge-file-name');
    if (nameEl) nameEl.textContent = file.name + ' (' + formatSize(file.size) + ')';
  }

  // ── FIX 2: Capture biz ID and file BEFORE any DOM destruction ───────────────
  // Previously, startMerge passed the bizId through runMerge but if the DOM
  // was destroyed between the click and the read, getElementById returned null.
  // Now we snapshot both values immediately on button click and pass explicitly.
  function startMerge() {
    // Read values RIGHT NOW, before any DOM changes
    const bizInput = document.getElementById('merge-biz-input');
    const capturedBizId = bizInput ? bizInput.value.trim() : '';
    const capturedFile = mergeFile; // snapshot the module-level ref

    console.log('[startMerge] bizId:', JSON.stringify(capturedBizId), '| file:', capturedFile ? capturedFile.name : 'none');

    if (!capturedBizId) { alert('Please enter a Business ID.'); return; }
    if (!capturedFile) { alert('Please select a chatbot file.'); return; }

    // Pass both captured values explicitly — don't rely on DOM or module state later
    runMerge(capturedBizId, capturedFile);
  }

  // ── FIX 3: runMerge accepts explicit parameters ──────────────────────────────
  async function runMerge(bizId, localMergeFile) {
    // Both args are required — validated by startMerge before calling
    if (!getPassword()) { addMessage('ai', '❌ Session expired — please refresh and log in again.'); return; }

    // Safe to destroy welcome DOM now — values already captured above
    removeWelcome();
    addMessage('user', '⚡ Deep Config: Business ID ' + bizId + ' + ' + localMergeFile.name);
    showTyping();

    try {
      // Step 1: fetch messages
      console.log('[runMerge] bizId:', JSON.stringify(bizId), '| len:', bizId.length);
      console.log('[runMerge] password set:', !!getPassword());
      const fetchRes = await fetch('/api/fetch-messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ business_id: bizId, password: getPassword() })
      });
      const fetchData = await fetchRes.json();
      console.log('[runMerge] response status:', fetchRes.status, '| body:', JSON.stringify(fetchData));
      if (fetchData.error) {
        removeTyping();
        addMessage('ai', '❌ Error fetching messages: ' + fetchData.error);
        return;
      }

      // Step 2: read file
      let fileContent = '';
      try {
        const fileText = await readFileAsText(localMergeFile);
        if (localMergeFile.name.endsWith('.json')) {
          try {
            const parsed = JSON.parse(fileText);
            const compact = JSON.stringify(parsed);
            fileContent = compact.length > 40000 ? compact.slice(0, 40000) + '\n\n[truncated]' : compact;
          } catch(e) { fileContent = fileText.slice(0, 40000); }
        } else {
          fileContent = fileText.slice(0, 40000);
        }
      } catch(e) {
        removeTyping();
        addMessage('ai', '❌ Could not read file: ' + e.message);
        return;
      }

      // Step 3: build merged prompt and call Claude
      const prompt =
        'MODE C — DEEP CONFIG: Chatbot File + Conversation History\n\n' +
        'Business ID: ' + bizId + '\n\n' +
        '--- CHATBOT FILE: ' + localMergeFile.name + ' ---\n' + fileContent + '\n\n' +
        '--- WHATSAPP CONVERSATION HISTORY (' + fetchData.unique_count + ' unique messages from ' + fetchData.message_count + ' total) ---\n' +
        fetchData.formatted_messages + '\n\n' +
        'Using BOTH the chatbot file AND the real conversation history above, generate a complete AI Agent configuration. ' +
        'Cross-reference the chatbot intents with actual customer questions to produce stronger, more accurate intents, ' +
        'a grounded role definition, and test cases based on real message patterns. Output all 3 files.';

      conversationHistory.push({ role: 'user', content: prompt });

      const chatRes = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory, password: getPassword() })
      });
      const chatData = await chatRes.json();
      removeTyping();
      if (chatData.error) { addMessage('ai', '❌ ' + chatData.error); }
      else { addMessage('ai', chatData.content); conversationHistory.push({ role: 'assistant', content: chatData.content }); }

    } catch(err) {
      removeTyping();
      addMessage('ai', '❌ Error: ' + err.message);
    }

    // Clear state only after we're done with the values
    mergeFile = null;
  }

  // ── OTHER CARD HANDLERS ──────────────────────────────────────────────────────
  function triggerFileCard() { document.getElementById('card-file-input').click(); }

  function toggleBizForm(e) {
    e.stopPropagation();
    const form = document.getElementById('card-biz-form');
    form.classList.toggle('visible');
    if (form.classList.contains('visible')) setTimeout(() => document.getElementById('card-biz-input').focus(), 50);
  }

  function focusDescription() { document.getElementById('user-input').focus(); }

  function cardDragOver(e, cardId) { e.preventDefault(); document.getElementById(cardId).classList.add('drag-over'); }
  function cardDragLeave(cardId) { document.getElementById(cardId).classList.remove('drag-over'); }
  function cardDrop(e) {
    e.preventDefault();
    document.getElementById('card-file').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) attachFile(file, true);
  }

  async function cardFetchBizId() {
    // FIX: Capture biz ID immediately before any async/DOM work
    const bizInput = document.getElementById('card-biz-input');
    const bizId = bizInput ? bizInput.value.trim() : '';

    // ── DEBUG ──────────────────────────────────────────────────────────────────
    console.log('[cardFetchBizId] bizId:', JSON.stringify(bizId), '| len:', bizId.length);
    console.log('[cardFetchBizId] password set:', !!getPassword());
    // ──────────────────────────────────────────────────────────────────────────

    if (!bizId) return;
    if (!getPassword()) { addMessage('ai', '❌ Session expired — please refresh and log in again.'); return; }

    const btn = document.getElementById('card-biz-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Fetching...'; }

    removeWelcome();
    addMessage('user', 'Business ID: ' + bizId);
    showTyping();

    try {
      const _payload = { business_id: bizId, password: getPassword() };
      console.log('[cardFetchBizId] sending payload:', JSON.stringify({ business_id: bizId, password: '[REDACTED]' }));
      const fetchRes = await fetch('/api/fetch-messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(_payload)
      });
      const fetchData = await fetchRes.json();
      console.log('[cardFetchBizId] response status:', fetchRes.status, '| body:', JSON.stringify(fetchData));
      if (fetchData.error) {
        removeTyping();
        addMessage('ai', '❌ Error fetching messages: ' + fetchData.error);
        return;
      }
      const prompt = 'Business ID: ' + bizId + '\n\nI have fetched the last ' + fetchData.message_count + ' WhatsApp messages for this business. Please analyze these conversations and generate a complete AI Agent configuration including all 3 output files.\n\nMESSAGES:\n' + fetchData.formatted_messages;

      // Always use a fresh history — never accumulate stale turns
      conversationHistory = [{ role: 'user', content: prompt }];

      const chatPayload = { messages: conversationHistory, password: getPassword() };
      const chatPayloadStr = JSON.stringify(chatPayload);
      console.log('[cardFetchBizId] chat payload size (bytes):', chatPayloadStr.length);
      console.log('[cardFetchBizId] messages count:', conversationHistory.length);
      console.log('[cardFetchBizId] password in payload:', !!chatPayload.password);

      const chatRes = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: chatPayloadStr
      });

      // Log raw response text before parsing so we see the actual 400 error body
      const chatRawText = await chatRes.text();
      console.log('[cardFetchBizId] chat response status:', chatRes.status);
      console.log('[cardFetchBizId] chat response body:', chatRawText.slice(0, 500));

      let chatData;
      try { chatData = JSON.parse(chatRawText); }
      catch(e) { removeTyping(); addMessage('ai', '❌ Bad response from server: ' + chatRawText.slice(0, 200)); return; }

      removeTyping();
      if (chatData.error) { addMessage('ai', '❌ ' + chatData.error); }
      else { addMessage('ai', chatData.content); conversationHistory.push({ role: 'assistant', content: chatData.content }); }
    } catch(err) {
      removeTyping();
      addMessage('ai', '❌ Connection error: ' + err.message);
    }
  }

  // ── FILE HELPERS ─────────────────────────────────────────────────────────────
  function getFileIcon(name) {
    if (name.endsWith('.pdf')) return '📕';
    if (name.endsWith('.docx')) return '📘';
    if (name.endsWith('.json')) return '📋';
    return '📄';
  }
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }
  function attachFile(file, autoSend = false) {
    pendingFile = file;
    document.getElementById('fp-icon').textContent = getFileIcon(file.name);
    document.getElementById('fp-name').textContent = file.name + ' (' + formatSize(file.size) + ')';
    document.getElementById('file-preview').classList.add('visible');
    removeWelcome();
    if (autoSend) setTimeout(() => sendMessage(), 150);
    else document.getElementById('user-input').focus();
  }
  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const autoSend = event.target.id === 'card-file-input';
    attachFile(file, autoSend);
  }
  function removeFile() {
    pendingFile = null;
    ['file-input', 'card-file-input'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('file-preview').classList.remove('visible');
  }
  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  // ── MESSAGES ─────────────────────────────────────────────────────────────────
  function removeWelcome() { const wa = document.getElementById('welcome-area'); if (wa) wa.remove(); }

  function addMessage(role, content) {
    removeWelcome();
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (role === 'ai' ? 'ai' : 'user-av');
    avatar.textContent = role === 'ai' ? 'AI' : 'AM';
    const bubble = document.createElement('div');
    if (role === 'ai') {
      bubble.className = 'bubble ai-bubble';
      bubble.innerHTML = marked.parse(content);
      const files = extractFiles(content);
      const bar = makeDownloadBar(files);
      if (bar) bubble.appendChild(bar);
    } else {
      bubble.className = 'bubble';
      bubble.textContent = content;
    }
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addFileBubble(file) {
    removeWelcome();
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message user';
    const avatar = document.createElement('div');
    avatar.className = 'avatar user-av';
    avatar.textContent = 'AM';
    const bubble = document.createElement('div');
    bubble.className = 'file-bubble';
    bubble.innerHTML = '<span class="file-icon">' + getFileIcon(file.name) + '</span><div><div class="file-name">' + file.name + '</div><div class="file-size">' + formatSize(file.size) + '</div></div>';
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai'; div.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(avatar); div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function removeTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

  // ── SEND ─────────────────────────────────────────────────────────────────────
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text && !pendingFile) return;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    let userContent = [];
    let pendingFileWasSet = !!pendingFile;
    if (pendingFile) {
      addFileBubble(pendingFile);
      showTyping();
      try {
        const fileText = await readFileAsText(pendingFile);
        let fileContent = '';
        if (pendingFile.name.endsWith('.json')) {
          try { const parsed = JSON.parse(fileText); const compact = JSON.stringify(parsed); fileContent = compact.length > 60000 ? compact.slice(0, 60000) + '\n\n[truncated]' : compact; }
          catch(e) { fileContent = fileText.slice(0, 60000); }
        } else { fileContent = fileText.slice(0, 60000); }
        userContent = 'File: ' + pendingFile.name + '\n\n' + fileContent + (text ? '\n\nUser note: ' + text : '\n\nPlease analyze this file and generate a complete AI Agent configuration.');
      } catch(e) {
        removeTyping(); addMessage('ai', '❌ Could not read file: ' + e.message);
        document.getElementById('send-btn').disabled = false; removeFile(); return;
      }
      removeFile();
    } else { userContent = text; }
    if (text) addMessage('user', text);
    conversationHistory.push({ role: 'user', content: userContent });
    if (!pendingFileWasSet) showTyping();
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 120000);
      let res;
      try {
        res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory, password: getPassword() }),
          signal: controller.signal
        });
      } finally { clearTimeout(timeout); }
      if (!res.ok) { const errText = await res.text().catch(() => 'Unknown error'); removeTyping(); addMessage('ai', '❌ Server error ' + res.status + ': ' + errText.slice(0, 300)); document.getElementById('send-btn').disabled = false; return; }
      const data = await res.json();
      removeTyping();
      if (data.error) { addMessage('ai', '❌ ' + data.error); }
      else { addMessage('ai', data.content); conversationHistory.push({ role: 'assistant', content: data.content }); }
    } catch(err) {
      removeTyping();
      if (err.name === 'AbortError') addMessage('ai', '❌ Request timed out after 2 minutes.');
      else addMessage('ai', '❌ Connection error: ' + err.message);
    }
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  function resetConversation() {
    conversationHistory = []; pendingFile = null; mergeFile = null;
    removeTyping();
    ['file-input'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('file-preview').classList.remove('visible');
    const ui = document.getElementById('user-input');
    ui.value = ''; ui.style.height = 'auto';
    document.getElementById('send-btn').disabled = false;
    renderWelcome(); ui.focus();
  }

  // ── DOWNLOAD HELPERS ─────────────────────────────────────────────────────────
  function extractFiles(content) {
    const files = []; const seen = new Set(); let m;
    const re1 = /---+[ \t]*([\w][\w._-]*\.txt)[ \t]*---+[ \t]*\n([\s\S]*?)(?=---+[ \t]*[\w][\w._-]*\.txt[ \t]*---+|$)/gi;
    while ((m = re1.exec(content)) !== null) {
      const name = m[1].trim(); const body = m[2].trim();
      if (body && !seen.has(name)) { seen.add(name); files.push({ name, content: body }); }
    }
    if (!files.length) {
      const re2 = /FILE[ \t]*\d+:[ \t]*([\w][\w._-]*\.txt)[ \t]*\n([\s\S]*?)(?=FILE[ \t]*\d+:|$)/gi;
      while ((m = re2.exec(content)) !== null) {
        const name = m[1].trim(); const body = m[2].trim();
        if (body && !seen.has(name)) { seen.add(name); files.push({ name, content: body }); }
      }
    }
    return files;
  }
  function makeDownloadBar(files) {
    if (!files.length) return null;
    const bar = document.createElement('div'); bar.className = 'download-bar';
    files.forEach(f => {
      const blob = new Blob([f.content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.className = 'dl-btn'; a.href = url; a.download = f.name;
      a.innerHTML = '<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' + f.name;
      bar.appendChild(a);
    });
    return bar;
  }
</script>
